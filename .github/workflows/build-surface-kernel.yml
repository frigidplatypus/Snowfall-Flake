name: Build Surface Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock
      - systems/x86_64-linux/surface/**
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: build-surface-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-surface-kernel:
    runs-on: ubuntu-latest
    env:
      NIX_OVERRIDE_INPUTS: >-
        --override-input hermes path:./.github/ci-stubs/hermes
        --override-input email-to-miniflux path:./.github/ci-stubs/email-to-miniflux
        --override-input silverbullet-mcp path:./.github/ci-stubs/silverbullet-mcp
        --override-input nr path:./.github/ci-stubs/nr
        --override-input sbtask path:./.github/ci-stubs/sbtask
        --override-input silverbullet-api-gateway path:./.github/ci-stubs/silverbullet-api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: frgd-surface-kernel
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Show kernel version
        run: nix eval $NIX_OVERRIDE_INPUTS --raw .#nixosConfigurations.surface.config.boot.kernelPackages.kernel.version

      - name: Build surface kernel
        run: nix build $NIX_OVERRIDE_INPUTS .#nixosConfigurations.surface.config.system.build.kernel

      - name: Build surface initial ramdisk
        run: nix build $NIX_OVERRIDE_INPUTS .#nixosConfigurations.surface.config.system.build.initialRamdisk
